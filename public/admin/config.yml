backend:
  name: github
  repo: prabhakarmdes12-cmyk/House-of-Giriraj
  branch: master

local_backend: true

logo_url: /images/House_of_Giriraj.svg
display_url: /

media_folder: public/assets/images/products
public_folder: /assets/images/products

product_defaults: &product_defaults
  create: true
  delete: true
  identifier_field: id
  extension: md
  format: yaml-frontmatter
  slug: "{{id}}"
  summary: "{{name}}"
  sortable_fields: ["name"]

product_fields: &product_fields
  - { label: "Product ID", name: "id", widget: "string" }
  - { label: "Product Name", name: "name", widget: "string" }
  - { label: "Subcategory", name: "subcategory", widget: "select", options: ["chokers", "necklaces", "earrings", "bracelets", "bangles", "rings"] }
  - { label: "Short Description", name: "shortDesc", widget: "string" }
  - { label: "Price Range", name: "priceRange", widget: "string" }
  - { label: "Stone", name: "stone", widget: "string" }
  - { label: "Metal", name: "metal", widget: "string" }
  - { label: "Weight", name: "weight", widget: "string" }
  - { label: "Certification", name: "cert", widget: "string" }
  - { label: "Featured", name: "featured", widget: "boolean", default: false }
  - { label: "Description", name: "body", widget: "markdown", required: false }
  - { label: "Main Image", name: "image", widget: "image", required: false }
  - label: "Image Gallery"
    name: "gallery"
    widget: "list"
    required: false
    fields:
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Caption", name: "caption", widget: "string", required: false }
  - label: "Videos"
    name: "videos"
    widget: "list"
    required: false
    fields:
      - { label: "Video File", name: "video", widget: "file" }
      - { label: "Poster Image", name: "poster", widget: "image", required: false }

collections:
  - name: "chokers"
    label: "Chokers"
    label_singular: "Choker"
    <<: *product_defaults
    folder: products/chokers
    fields: *product_fields

  - name: "necklaces"
    label: "Necklaces"
    label_singular: "Necklace"
    <<: *product_defaults
    folder: products/necklaces
    fields: *product_fields

  - name: "chandeliers"
    label: "Chandeliers"
    label_singular: "Chandelier"
    <<: *product_defaults
    folder: products/chandeliers
    fields: *product_fields

  - name: "bracelets"
    label: "Bracelets"
    label_singular: "Bracelet"
    <<: *product_defaults
    folder: products/bracelets
    fields: *product_fields

  - name: "bangles"
    label: "Bangles"
    label_singular: "Bangle"
    <<: *product_defaults
    folder: products/bangles
    fields: *product_fields

  - name: "rings"
    label: "Rings"
    label_singular: "Ring"
    <<: *product_defaults
    folder: products/rings
    fields: *product_fields

  - name: "studs"
    label: "Studs"
    label_singular: "Stud"
    <<: *product_defaults
    folder: products/studs
    fields: *product_fields

  - name: "house-collection"
    label: "House Collection"
    label_singular: "Piece"
    create: true
    delete: true
    identifier_field: id
    extension: md
    format: yaml-frontmatter
    slug: "{{id}}"
    folder: "src/data/house-collection-entries"
    media_folder: "public/assets/images/collection/{{slug}}"
    public_folder: "/assets/images/collection/{{slug}}"
    summary: "{{title}}"
    fields:
      - { label: "ID", name: "id", widget: "string", hint: "URL slug — no spaces, use hyphens" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Reference Code", name: "ref", widget: "string" }
      - { label: "Category", name: "category", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Hero Line", name: "hero", widget: "string" }
      - label: "Images"
        name: "images"
        widget: "list"
        required: false
        summary: "{{image}}"
        fields:
          - { label: "Image", name: "image", widget: "image" }
      - { label: "Show on Homepage", name: "onHomepage", widget: "boolean", default: true }
      - { label: "Homepage Row (1-3, leave blank if not on homepage)", name: "row", widget: "number", required: false, min: 1, max: 3 }
      - { label: "Homepage Order (within row — 1, 2, 3)", name: "homepageOrder", widget: "number", required: false, min: 1, max: 3 }
